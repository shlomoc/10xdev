  <rect x="10" y="10" width="108" height="108" rx="30" fill="url(#logo-bg)"/>
  <rect x="12.5" y="12.5" width="103" height="103" rx="27.5" stroke="#5EEAD4" stroke-opacity="0.22" stroke-width="5"/>
